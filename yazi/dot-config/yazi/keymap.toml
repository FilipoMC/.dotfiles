[[mgr.prepend_keymap]]
on = ["<S-h>"]
run = 'shell "glry \"$PWD\"" --block'

[[mgr.prepend_keymap]]
on = ["g", "l"]
run = 'cd --interactive'
desc = "Jump interactively"

[[mgr.prepend_keymap]]
on = "!"
for = "unix"
run = 'shell "$SHELL" --block'
desc = "Open $SHELL here"

#####################
###### PLUGINS ######
#####################

[[mgr.prepend_keymap]]
on = "="
run = "plugin zoom 1"
desc = "Zoom in hovered file"

[[mgr.prepend_keymap]]
on = "-"
run = "plugin zoom -1"
desc = "Zoom out hovered file"

[[mgr.prepend_keymap]]
on = "<S-t>"
run = "plugin toggle-pane max-preview"
desc = "Maximize or restore the preview pane"

[[mgr.prepend_keymap]]
on = "<S-r>"
run = "plugin toggle-pane max-current"
desc = "Maximize or restore the current pane"

[[mgr.prepend_keymap]]
on = ["c", "m"]
run = "plugin chmod"
desc = "Chmod on selected files"

[[mgr.prepend_keymap]]
on = "<S-f>"
run = "plugin smart-filter"
desc = "Smart filter"

# Open disk mount menu
[[mgr.prepend_keymap]]
on = "<S-m>"
run = "plugin mount"

# Copy yanked files to the system clipboard
[[mgr.prepend_keymap]]
on = "<S-y>"
run = ['yank', 'plugin clipboard -- --action=copy']

# Paste files from the system clipboard into the current directory
[[mgr.prepend_keymap]]
on = "<S-p>"
run = ['plugin clipboard -- --action=paste']

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin wise-enter"
desc = "Wise enter"

# Interactive fzf/grep for files and file contents, open in editor
[[mgr.prepend_keymap]]
on = ["<S-f>", "<S-g>"]
run = "plugin yafg"

[[mgr.prepend_keymap]]
on = ["g", "r"]
run = "plugin cd-git-root"
desc = "Go to git repo root"

